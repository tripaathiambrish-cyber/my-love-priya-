<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For You, Priya</title>
    <style>
        :root {
            --primary-pink: #ff6b81;
            --dark-pink: #ff4757;
            --soft-bg: #fff5f6;
            --text-color: #4a4a4a;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', 'Segoe UI', sans-serif;
        }

        body {
            background-color: var(--soft-bg);
            color: var(--text-color);
            overflow: hidden;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* Continuous Background Floating Hearts Effect */
        .hearts-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
        }

        /* Premium Card Design with Fade-In Effect */
        .container {
            max-width: 600px;
            width: 100%;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(15px);
            border-radius: 30px;
            padding: 35px 25px;
            box-shadow: 0 20px 50px rgba(255, 107, 129, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.7);
            text-align: center;
            z-index: 10;
            animation: fadeInUp 1s ease forwards;
        }

        /* Cartoon Floating Mascot Effect */
        .animation-box {
            width: 160px;
            height: 160px;
            margin: 0 auto 15px;
            position: relative;
            animation: floatMascot 3s ease-in-out infinite;
        }

        /* Cute Cartoon Heart Mascot */
        .cute-mascot {
            width: 110px;
            height: 110px;
            background: var(--primary-pink);
            position: relative;
            margin: 25px auto;
            transform: rotate(-45deg);
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(255, 107, 129, 0.4);
        }

        .cute-mascot::before, .cute-mascot::after {
            content: "";
            width: 110px;
            height: 110px;
            background: var(--primary-pink);
            border-radius: 50%;
            position: absolute;
        }

        .cute-mascot::before { top: -55px; left: 0; }
        .cute-mascot::after { left: 55px; top: 0; }

        .mascot-face {
            position: absolute;
            transform: rotate(45deg);
            top: 5px;
            left: 25px;
            z-index: 10;
            width: 70px;
            height: 70px;
        }

        .eyes {
            display: flex;
            justify-content: space-between;
            width: 100%;
            margin-top: 20px;
        }

        .eye {
            width: 10px;
            height: 10px;
            background: #fff;
            border-radius: 50%;
            position: relative;
            animation: blinkEye 4s infinite;
        }

        .eye::after {
            content: '';
            width: 4px;
            height: 4px;
            background: #000;
            border-radius: 50%;
            position: absolute;
            top: 1px;
            left: 3px;
        }

        .smile {
            width: 20px;
            height: 10px;
            border-bottom: 4px solid #fff;
            border-radius: 0 0 12px 12px;
            margin: 12px auto 0;
        }

        .blush {
            display: flex;
            justify-content: space-between;
            width: 110%;
            margin-left: -5px;
            position: absolute;
            top: 32px;
        }

        .blush-spot {
            width: 12px;
            height: 7px;
            background: rgba(255, 255, 255, 0.4);
            border-radius: 50%;
        }

        h1 {
            color: var(--dark-pink);
            font-size: 2.3rem;
            margin-bottom: 5px;
        }

        .subtitle {
            font-size: 1rem;
            color: #888;
            margin-bottom: 25px;
            font-style: italic;
        }

        /* Love Letter Envelope Design */
        .love-letter {
            background: #fff;
            border-left: 5px solid var(--primary-pink);
            padding: 20px;
            border-radius: 15px;
            text-align: left;
            line-height: 1.7;
            font-size: 1.05rem;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.01);
            margin-bottom: 30px;
            min-height: 150px;
        }

        /* Typing Effect Element */
        #typing-text {
            white-space: pre-line;
        }

        .highlight-text {
            color: var(--dark-pink);
            font-weight: 600;
        }

        /* Action Buttons Effect */
        .btn-group {
            display: flex;
            justify-content: center;
            gap: 20px;
            position: relative;
            height: 55px;
        }

        .btn {
            padding: 12px 35px;
            font-size: 1.1rem;
            font-weight: 600;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn-yes {
            background: linear-gradient(135deg, var(--primary-pink), var(--dark-pink));
            color: white;
            box-shadow: 0 10px 20px rgba(255, 107, 129, 0.3);
            z-index: 5;
        }

        .btn-yes:hover {
            transform: scale(1.1);
        }

        .btn-no {
            background: #f1f2f6;
            color: #57606f;
            position: absolute;
            transition: all 0.1s ease-out;
        }

        /* Success Screen Overlay Effect */
        .success-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: white;
            z-index: 100;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s ease;
        }

        .success-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        /* Heart Explosion Burst Particles */
        .burst-heart {
            position: fixed;
            pointer-events: none;
            z-index: 105;
            animation: burst 1s cubic-bezier(0.1, 0.8, 0.3, 1) forwards;
        }

        /* Animations Logic */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes floatMascot {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-12px); }
        }

        @keyframes blinkEye {
            0%, 90%, 100% { transform: scaleY(1); }
            95% { transform: scaleY(0.1); }
        }

        @keyframes floatUpwards {
            0% { transform: translateY(105vh) scale(0.5); opacity: 0; }
            10% { opacity: 0.8; }
            100% { transform: translateY(-10vh) scale(1.2); opacity: 0; }
        }

        @keyframes burst {
            0% { transform: translate(0, 0) scale(1); opacity: 1; }
            100% { transform: translate(var(--tx), var(--ty)) scale(0); opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="hearts-bg" id="heartsBg"></div>

    <div class="container">
        <!-- Cartoon Animated Mascot -->
        <div class="animation-box">
            <div class="cute-mascot">
                <div class="mascot-face">
                    <div class="eyes">
                        <div class="eye"></div>
                        <div class="eye"></div>
                    </div>
                    <div class="blush">
                        <div class="blush-spot"></div>
                        <div class="blush-spot"></div>
                    </div>
                    <div class="smile"></div>
                </div>
            </div>
        </div>

        <h1>Hey Priya ✨</h1>
        <p class="subtitle">Mera dil aapse kuch kehna chahta hai...</p>

        <!-- Dynamic Typing Love Letter Effect Box -->
        <div class="love-letter">
            <span id="typing-text"></span>
        </div>

        <!-- Buttons group with smart features -->
        <div class="btn-group">
            <button class="btn btn-yes" onclick="celebrate(event)">Yes! 💍</button>
            <button class="btn btn-no" id="noBtn" onmouseover="moveNoButton()" onclick="moveNoButton()">No</button>
        </div>
    </div>

    <!-- Success Celebration Effect Screen -->
    <div class="success-overlay" id="successScreen">
        <h1 style="font-size: 3.5rem; text-shadow: 0 5px 15px rgba(0,0,0,0.05);">Yayyy! 💖🎉</h1>
        <p style="font-size: 1.4rem; margin-top: 15px; color: var(--dark-pink); font-weight: 600; padding: 0 20px; text-align: center;">
            I love you, Priya! You've made my world absolutely perfect.
        </p>
        <div class="cute-mascot" style="animation: floatMascot 1.5s infinite; margin-top: 40px;">
            <div class="mascot-face">
                <div class="eyes"><div class="eye"></div><div class="eye"></div></div>
                <div class="blush"><div class="blush-spot"></div><div class="blush-spot"></div></div>
                <div class="smile"></div>
            </div>
        </div>
    </div>

    <script>
        // The Letter Content with the Affection line included flawlessly
        const letterText = `Jab se tum meri life me aayi ho, sab kuch badal sa gya hai. Mujhe nahi pata tha ki koi mere dil par itna gehra asar kar sakta hai.

Duniya me bohot si cheezein hain, par mere liye... "Affection matters, money doesn't matter." Tumhara yeh pyaar aur apnapan hi mere liye sab kuch hai.

Your presence brings a beautiful shine to my entire world—everything suddenly feels happier, brighter, and full of joy when you are around. Just a single smile from you can completely make my day perfect. 

Will you make me the happiest person and be mine? ❤️`;

        let index = 0;
        function typeWriter() {
            if (index < letterText.length) {
                document.getElementById("typing-text").innerHTML += letterText.charAt(index);
                index++;
                setTimeout(typeWriter, 40); // Controls typing effect speed
            }
        }
        // Start typing effect on load
        window.onload = typeWriter;

        // Background Hearts Generation Effect
        function createBackgroundHeart() {
            const heart = document.createElement('div');
            heart.innerHTML = ['❤️','💖','🌸','✨'][Math.floor(Math.random() * 4)];
            heart.style.position = 'absolute';
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.top = '100vh';
            heart.style.fontSize = Math.random() * 18 + 12 + 'px';
            heart.style.opacity = Math.random() * 0.6 + 0.4;
            heart.style.pointerEvents = 'none';
            heart.style.animation = `floatUpwards ${Math.random() * 3 + 4}s linear forwards`;
            
            document.getElementById('heartsBg').appendChild(heart);
            setTimeout(() => heart.remove(), 7000);
        }
        setInterval(createBackgroundHeart, 350);

        // Smart "No" Button evasion logic effect
        function moveNoButton() {
            const noBtn = document.getElementById('noBtn');
            const x = Math.random() * (window.innerWidth - noBtn.offsetWidth - 40);
            const y = Math.random() * (window.innerHeight - noBtn.offsetHeight - 40);
            
            noBtn.style.position = 'fixed';
            noBtn.style.left = x + 'px';
            noBtn.style.top = y + 'px';
        }

        // Heart Explosion Burst Effect
        function createBurst(e) {
            for (let i = 0; i < 40; i++) {
                const particle = document.createElement('div');
                particle.className = 'burst-heart';
                particle.innerHTML = ['❤️','💖','✨'][Math.floor(Math.random() * 3)];
                particle.style.left = e.clientX + 'px';
                particle.style.top = e.clientY + 'px';
                particle.style.fontSize = Math.random() * 15 + 15 + 'px';
                
                // Random directions for burst explosion effect
                const angle = Math.random() * Math.PI * 2;
                const distance = Math.random() * 250 + 50;
                particle.style.setProperty('--tx', Math.cos(angle) * distance + 'px');
                particle.style.setProperty('--ty', Math.sin(angle) * distance + 'px');
                
                document.body.appendChild(particle);
                setTimeout(() => particle.remove(), 1000);
            }
        }

        // Final Celebration Transition Effect
        function celebrate(e) {
            createBurst(e);
            setTimeout(() => {
                document.getElementById('successScreen').classList.add('active');
                // Intense heart generation on victory
                setInterval(createBackgroundHeart, 60);
            }, 400);
        }
    </script>
</body>
</html>
